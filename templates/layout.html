<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="مدرسة الإمامين الجوادين للعلوم الدينية - كربلاء المقدسة">
    <title>{% block title %}مدرسة الإمامين الجوادين{% endblock %}</title>

    <!-- Font Awesome & Tailwind -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css?v=1.1">
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        @font-face {
            font-family: 'Al-Jazeera-Arabic';
            src: url('/static/fonts/al-jazeera.ttf') format('truetype');
            font-display: swap;
        }
        *, *::before, *::after { font-family: 'Al-Jazeera-Arabic', 'Tajawal', sans-serif !important; box-sizing: border-box; }
        [class^="fa-"], [class*=" fa-"] { font-family: 'Font Awesome 6 Free' !important; font-weight: 900 !important; }
        
        :root {
            --gold: #c5a059; --gold-light: #e2c285; --gold-dark: #8e7037;
            --dark: #0a0a0b; --dark2: #121214; --white: #FFFFFF;
            --transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body { background: var(--dark); color: #e0e0e0; line-height: 1.7; overflow-x: hidden; }
        .golden-title { text-align: center; margin-top: 50px; margin-bottom: 40px; font-size: 32px; color: var(--gold); font-weight: 700; }
        .luxury-card { background: var(--dark2); border: 1px solid rgba(197, 160, 89, 0.2); border-radius: 16px; transition: var(--transition); }
        .luxury-card:hover { transform: translateY(-5px); border-color: var(--gold); box-shadow: 0 10px 30px rgba(197, 160, 89, 0.15); }

        header { background: rgba(10, 10, 11, 0.9); backdrop-filter: blur(15px); position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.05); padding: 15px 48px; }
        .nav-link { color: rgba(255,255,255,0.7); text-decoration: none; padding: 8px 15px; font-size: 14px; transition: var(--transition); }
        .nav-link:hover { color: var(--gold-light); }
        .nav-btn { background: var(--gold); color: var(--dark) !important; border-radius: 8px; font-weight: 600; }
        
        footer { background: var(--dark); border-top: 1px solid rgba(197, 160, 89, 0.2); padding: 60px 48px; margin-top: 80px; }
        @media (max-width: 900px) { header { padding: 15px 20px; } .nav-links { display: none; } }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>

<header>
    <div class="container mx-auto flex justify-between items-center">
        <a href="{{ url_for('home') }}" class="flex items-center gap-4 text-decoration-none">
            <img src="https://i.ibb.co/8v1WMCg/logo-png.jpg" alt="Logo" class="w-12 h-12 rounded-full border border-[#c5a059]">
            <div>
                <h1 class="text-[#e2c285] text-lg font-bold leading-tight">مدرسة الإمامين الجوادين</h1>
                <p class="text-white/40 text-[10px]">للعلوم الدينية – كربلاء المقدسة</p>
            </div>
        </a>
        <nav class="nav-links flex items-center gap-2">
            <a href="{{ url_for('home') }}" class="nav-link">الرئيسية</a>
            <a href="{{ url_for('magazine') }}" class="nav-link">المجلة</a>
            <a href="{{ url_for('books') }}" class="nav-link">المؤلفات</a>
            <a href="{{ url_for('research') }}" class="nav-link">الأبحاث</a>
            <a href="{{ url_for('brochures') }}" class="nav-link">البروشورات</a>
            <a href="{{ url_for('articles') }}" class="nav-link">المقالات</a>
            <a href="https://forms.gle/SYbrxcbR3HbPfRxv7" target="_blank" class="nav-link nav-btn mr-4">التقديم</a>
        </nav>
    </div>
</header>

<main>
    {% block content %}{% endblock %}
</main>

<footer>
    <div class="container mx-auto text-center">
        <div class="flex justify-center gap-6 mb-8 text-2xl text-[#e2c285]">
            <a href="https://t.me/aljawadin313"><i class="fa-brands fa-telegram"></i></a>
            <a href="https://www.facebook.com/aljawadin313"><i class="fa-brands fa-facebook"></i></a>
            <a href="https://www.instagram.com/aljawadin313"><i class="fa-brands fa-instagram"></i></a>
        </div>
        <p class="text-white/30 text-sm">جميع الحقوق محفوظة &copy; 2026 — مدرسة الإمامين الجوادين للعلوم الدينية</p>
    </div>
</footer>

{% block scripts %}{% endblock %}
</body>
</html>
